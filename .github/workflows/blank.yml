
name: Release

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21
      - name: Install packwiz
        run: go install github.com/packwiz/packwiz@latest
      - name: Build Modrinth
        run: packwiz modrinth export -o modrinth.mrpack
      - name: Build Curseforge
        run: packwiz modrinth export -o curseforge.zip
      - name: Upload binaries to release (modrinth)
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: modrinth.mrpack
          asset_name: modrinth_$tag.mrpack
          tag: ${{ github.ref }}
          overwrite: true
      - name: Upload binaries to release (curse)
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: curseforge.zip
          asset_name: curseforge_$tag.zip
          tag: ${{ github.ref }}
          overwrite: true
